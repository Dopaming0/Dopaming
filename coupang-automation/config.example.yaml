# 쿠팡 과일 위탁판매 자동화 설정
# 이 파일을 config.yaml 로 복사한 뒤 실제 값을 채워 넣으세요. (config.yaml 은 git에 올라가지 않습니다)

timezone: Asia/Seoul

# WING > 추가판매정보 > OPEN API 키 발급 (유효기간 180일 — 만료 30일 전 알림이 옵니다)
coupang:
  vendor_id: "A00000000"        # 판매자 ID (WING에서 확인)
  access_key: "your-access-key"
  secret_key: "your-secret-key"

# 텔레그램 승인/알림 봇 (BotFather로 봇 생성 후 토큰 발급, chat_id는 본인 대화방 ID)
# 비워두면 봇 없이 동작하며, 발주 승인은 CLI(approve 명령)로 처리합니다.
telegram:
  bot_token: ""
  chat_id: ""

# 발주 배치 시각 (HH:MM, 로컬 시간). 신선식품 특성상 일 2회를 권장.
# 오전 배치는 공급처 당일출고 마감보다 1시간 이상 앞으로 조정하세요.
batches:
  - "09:00"
  - "21:00"

# API 키 만료 알림 기준일 (발급일 기록용)
api_key_issued_date: "2026-07-18"

database: data/dopaming.db
order_files_dir: data/orders

# ── 구글시트 연동: 도매처 가격·품절 자동 확인 ──────────────────────────
# 1) Google Cloud Console 에서 서비스 계정 생성 → JSON 키 다운로드 → 아래 경로에 저장
# 2) 구글시트를 서비스 계정 이메일(...@...iam.gserviceaccount.com)에 '편집자'로 공유
# 3) 시트 헤더 행에 '공급처URL' 열을 추가하고 상품별 도매처 상품페이지 주소 입력
#    → '현재공급가'/'품절여부'/'확인시각' 열은 자동 생성·기록됩니다
google_sheet:
  spreadsheet_id: "1SqlyZrBSV2-iXcDX5wnknqOBZMZCqBzxG7Fhj3HozCE"
  worksheet: "시트1"              # 감시할 탭 이름
  service_account_json: "service_account.json"

watch:
  interval_hours: 6               # 데몬에서 몇 시간마다 확인할지

# 공급처 정의. key(영문)는 SKU 매핑 CSV의 supplier_key 와 일치해야 합니다.
# order_sheet.columns 로 공급처별 발주 엑셀 양식(열 순서·헤더)을 맞춥니다.
# 사용 가능한 field:
#   receiver_name, receiver_phone, receiver_zip, receiver_addr,
#   supplier_item_name, coupang_item_name, qty, delivery_message,
#   order_id, shipment_box_id
# 공급처별 감시 설정(watch)
#   fetch: playwright        → 로그인해야 가격이 보이는 몰. coupang-auto watch-login <키> <로그인URL> 로 1회 로그인
#   price_selector / soldout_selector / soldout_text → 자동 파싱이 안 맞을 때 CSS 셀렉터로 지정
suppliers:
  woleokdojeon:
    name: "월억도전"
    watch:
      fetch: playwright          # B2B 몰은 대부분 로그인 후 가격 노출
    order_sheet:
      columns:
        - { header: "수취인명",   field: receiver_name }
        - { header: "연락처",     field: receiver_phone }
        - { header: "우편번호",   field: receiver_zip }
        - { header: "주소",       field: receiver_addr }
        - { header: "상품명",     field: supplier_item_name }
        - { header: "수량",       field: qty }
        - { header: "배송메시지", field: delivery_message }
        - { header: "주문번호",   field: order_id }
  sinseonmarket:
    name: "신선마켓"
    order_sheet:
      columns:
        - { header: "받는분",     field: receiver_name }
        - { header: "전화번호",   field: receiver_phone }
        - { header: "우편번호",   field: receiver_zip }
        - { header: "배송지",     field: receiver_addr }
        - { header: "품목명",     field: supplier_item_name }
        - { header: "수량",       field: qty }
        - { header: "요청사항",   field: delivery_message }
        - { header: "주문번호",   field: order_id }
  sanjimate:
    name: "산지메이트"
    order_sheet:
      columns:
        - { header: "수령인",     field: receiver_name }
        - { header: "휴대폰",     field: receiver_phone }
        - { header: "우편번호",   field: receiver_zip }
        - { header: "주소",       field: receiver_addr }
        - { header: "상품",       field: supplier_item_name }
        - { header: "수량",       field: qty }
        - { header: "배송메모",   field: delivery_message }
        - { header: "주문번호",   field: order_id }
  # 감시 전용 공급처 (발주 양식 없이 가격·품절 확인만)
  sikpumbaekeok:
    name: "식품백억"
    watch:
      fetch: playwright
  mangocompany:
    name: "망고컴퍼니"
    watch:
      fetch: playwright
